name: Python tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Check Python version
        run: |
          python --version
          python -m pip --version

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip check

      - name: Run unit tests
        env:
          PYTHONPATH: .
        run: |
          python -m unittest \
            tests.test_dataframe_utils \
            tests.test_datasets \
            tests.test_rgba_conversion \
            tests.test_scaling \
            tests.test_segmentation \
            -v


  radiomics-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.8
        uses: actions/setup-python@v5
        with:
          python-version: "3.8"

      - name: Install radiomics dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install --only-binary=:all: SimpleITK==2.4.0
          python -m pip install -r requirements-radiomics.txt
          python -m pip check

      - name: Run radiomics tests
        env:
          PYTHONPATH: .
        run: |
          python -m unittest tests.test_dataset_radiomics -v